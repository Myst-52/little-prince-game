<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小王子 · 星际漫游</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>
    <div class="shooting-star"></div>
    
    <!-- 主容器 -->
    <div class="game-container">
        <!-- 开始界面 -->
        <div id="start-screen" class="screen active">
            <div class="title-area">
                <div class="planet-icon">🌹</div>
                <h1 class="game-title">小王子</h1>
                <p class="game-subtitle">· 星际漫游 ·</p>
            </div>
            <div class="start-content">
                <p class="quote">"所有的大人都曾经是小孩，虽然，只有少数的人记得。"</p>
                <p class="quote-author">—— 安托万·德·圣-埃克苏佩里</p>
                <button class="btn btn-primary" onclick="startGame()">
                    <span class="btn-icon">✦</span> 开始旅程
                </button>
            </div>
        </div>

        <!-- 游戏主界面 -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="location-badge" id="location-badge">
                    <span class="location-icon">🌍</span>
                    <span id="current-location">B-612星球</span>
                </div>
                <div class="chapter-indicator">
                    <span id="chapter-num">第1章</span>
                </div>
            </div>
            
            <div class="story-panel">
                <div class="story-text" id="story-text">
                    <!-- 故事内容将通过JS动态加载 -->
                </div>
            </div>

            <div class="choices-panel" id="choices-panel">
                <!-- 选项将通过JS动态加载 -->
            </div>

            <div class="game-footer">
                <div class="stats-bar">
                    <div class="stat">
                        <span class="stat-icon">💖</span>
                        <span class="stat-label">羁绊值</span>
                        <span class="stat-value" id="love-stat">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-icon">⭐</span>
                        <span class="stat-label">星星</span>
                        <span class="stat-value" id="star-stat">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-icon">🎒</span>
                        <span class="stat-label">物品</span>
                        <span class="stat-value" id="item-stat">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 结局界面 -->
        <div id="ending-screen" class="screen">
            <div class="ending-content">
                <div class="ending-icon" id="ending-icon">🌟</div>
                <h2 class="ending-title" id="ending-title">旅程结束</h2>
                <div class="ending-text" id="ending-text">
                    <!-- 结局内容 -->
                </div>
                <div class="ending-stats">
                    <div class="ending-stat">
                        <span>羁绊值：</span>
                        <span id="final-love">0</span>
                    </div>
                    <div class="ending-stat">
                        <span>收集星星：</span>
                        <span id="final-stars">0</span>
                    </div>
                </div>
                <div class="ending-actions">
                    <button class="btn btn-secondary" onclick="restartGame()">
                        <span class="btn-icon">🔄</span> 重新开始
                    </button>
                    <button class="btn btn-primary" onclick="showCredits()">
                        <span class="btn-icon">📜</span> 制作名单
                    </button>
                </div>
            </div>
        </div>

        <!-- 制作名单 -->
        <div id="credits-screen" class="screen">
            <div class="credits-content">
                <h2>制作名单</h2>
                <div class="credits-list">
                    <p><strong>原著</strong>：安托万·德·圣-埃克苏佩里《小王子》</p>
                    <p><strong>游戏设计</strong>：25文编 陶诗曼 AI协作创作</p>
                    <p><strong>技术栈</strong>：HTML5 + CSS3 + JavaScript</p>
                    <p><strong>特别鸣谢</strong>：每一位曾经是孩子的大人</p>
                </div>
                <div class="final-quote">
                    <p>"真正重要的东西，用眼睛是看不见的。"</p>
                </div>
                <button class="btn btn-primary" onclick="goToStart()">
                    <span class="btn-icon">🏠</span> 返回首页
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
